model_list:
  - model_name: default
    litellm_params:
      model: openai/default
      api_base: os.environ/LITELLM_LLM_URL
      api_key: not-needed

  - model_name: "*"
    litellm_params:
      model: openai/*
      api_base: os.environ/LITELLM_LLM_URL
      api_key: not-needed

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
