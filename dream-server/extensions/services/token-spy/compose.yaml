# Token Spy — LLM usage monitoring service
#
# When TOKEN_SPY_AUTH_MODE=local, starts per-service monitoring
# instances inside the same container (ports 8081-8084). All share
# one SQLite database, so the dashboard at :3005 shows all agents.
#
# Port mapping:
#   8080 — main instance (dashboard, cloud/agent monitoring)
#   8081 — open-webui monitoring
#   8082 — perplexica monitoring
#   8083 — openclaw monitoring
#   8084 — litellm monitoring
#   8085 — n8n workflow monitoring
services:
  token-spy:
    build:
      context: ./extensions/services/token-spy
      dockerfile: Dockerfile
    container_name: dream-token-spy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${TOKEN_SPY_PORT:-3005}:8080"
    volumes:
      - ./data/token-spy:/app/data
    environment:
      - API_PROVIDER=openai
      - OPENAI_UPSTREAM=${LLM_API_URL:-http://llama-server:8080}
      - AGENT_NAME=${TOKEN_SPY_AGENT_NAME:-token-spy}
      - AUTH_MODE=${TOKEN_SPY_AUTH_MODE:-}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
